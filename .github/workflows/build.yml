name: Build KimiDesk

# Déclenche le build :
#  - quand tu pousses un tag de version (ex. v1.0.0)  -> crée une Release avec les fichiers
#  - manuellement depuis l'onglet "Actions" de GitHub (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Builder l'application
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Publier les artefacts de build
        uses: actions/upload-artifact@v4
        with:
          name: kimidesk-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: ignore

  release:
    # Crée une Release GitHub avec les fichiers quand on pousse un tag v*
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Récupérer les artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Créer la Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
